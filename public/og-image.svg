<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo -->
  <rect width="1200" height="630" fill="#0b0b0b"/>

  <!-- Borda exterior sutil -->
  <rect x="32" y="32" width="1136" height="566" fill="none" stroke="#2a2623" stroke-width="1"/>

  <!-- Linha vertical de destaque em dourado -->
  <rect x="80" y="140" width="2" height="340" fill="#b08d57" opacity="0.7"/>

  <!-- Nome principal -->
  <text
    x="112"
    y="268"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="68"
    font-weight="600"
    fill="#f5f1ea"
    letter-spacing="-1"
  >Monique Ranauro</text>

  <!-- Separador dourado -->
  <rect x="112" y="294" width="72" height="1" fill="#b08d57"/>

  <!-- Subtítulo -->
  <text
    x="112"
    y="340"
    font-family="Arial, Helvetica, sans-serif"
    font-size="18"
    font-weight="400"
    fill="#b08d57"
    letter-spacing="5"
  >ADVOGADA CRIMINALISTA</text>

  <!-- Localização -->
  <text
    x="112"
    y="400"
    font-family="Arial, Helvetica, sans-serif"
    font-size="17"
    fill="#a8a29e"
    letter-spacing="1"
  >Nova Iguaçu · Baixada Fluminense · Grande Rio</text>

  <!-- Separador inferior -->
  <rect x="80" y="520" width="1040" height="1" fill="#2a2623"/>

  <!-- Rodapé -->
  <text
    x="112"
    y="560"
    font-family="Arial, Helvetica, sans-serif"
    font-size="13"
    fill="#a8a29e"
    opacity="0.6"
    letter-spacing="2"
  >ADVOCACIA CRIMINAL ESTRATÉGICA · PLANTÃO 24H</text>

  <!-- Canto decorativo superior direito -->
  <line x1="1080" y1="80" x2="1120" y2="80" stroke="#b08d57" stroke-width="1" opacity="0.5"/>
  <line x1="1120" y1="80" x2="1120" y2="120" stroke="#b08d57" stroke-width="1" opacity="0.5"/>

  <!-- Canto decorativo inferior esquerdo -->
  <line x1="80" y1="550" x2="80" y2="560" stroke="#b08d57" stroke-width="1" opacity="0.3"/>
</svg>
